services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smart-inbox-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_models:/app/backend/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: smart-inbox-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_PREDICT_URL: http://backend:8000/predict
    ports:
      - "${FRONTEND_PORT:-8501}:8501"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/').read()"]
      interval: 15s
      timeout: 3s
      retries: 10
      start_period: 20s

volumes:
  backend_models:
